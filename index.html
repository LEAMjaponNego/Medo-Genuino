<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenho um pedido...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffe4e1; font-family: sans-serif; overflow: hidden; }
        #card { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 350px; width: 80%; position: relative; }
        img { width: 150px; border-radius: 10px; margin-bottom: 20px; }
        h1 { color: #d1105a; font-size: 1.5rem; }
        .btns { display: flex; justify-content: center; gap: 20px; margin-top: 20px; height: 50px; }
        button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #sim { background: #ff4d6d; color: white; }
        #nao { background: #888; color: white; z-index: 999; }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="lua-cheia.mp3" type="audio/mpeg">
    </audio>

    <div id="card">
        <img id="img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueXpueCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif">
        <h1 id="txt">Senhorita Manuela Valente,seu maior fã tem uma pergunta.
            
            Aceita namorar comigo?</h1>
        <div class="btns">
            <button id="sim" onclick="aceitou()">Sim!</button>
            <button id="nao" onmouseover="foge()" onclick="foge()">Não</button>
        </div>
    </div>

    <script>
        function foge() {
            const btn = document.getElementById("nao");
            btn.style.position = "fixed";
            btn.style.left = (Math.random() * (window.innerWidth - 100)) + "px";
            btn.style.top = (Math.random() * (window.innerHeight - 100)) + "px";
        }

        function aceitou() {
            const m = document.getElementById("musica");
            m.play().catch(() => console.log("Sem áudio encontrado"));
            
            confetti(); // Solta confete simples
            
            document.getElementById("card").innerHTML = `
                <img src="https://i.imgur.com/ARvrKLo.png">
                <h1 style="color: #ff4d6d">Obrigado por aceitar esse pedido tosco do SEU guti! ❤️</h1>
            `;
        }
    </script>
</body>
</html>
